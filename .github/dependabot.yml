version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "backend"
    groups:
      boto:
        patterns:
          - "boto3"
          - "botocore"

  - package-ecosystem: "npm"
    directory: "/web"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "web"
    groups:
      vite:
        patterns:
          - "vite"
          - "@tailwindcss/vite"
          - "tailwindcss"
      vueuse:
        patterns:
          - "@vueuse/*"

  - package-ecosystem: "npm"
    directory: "/mobile"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "mobile"
    groups:
      vite:
        patterns:
          - "vite"
          - "@tailwindcss/vite"
          - "tailwindcss"
      capacitor:
        patterns:
          - "@capacitor/*"
      ionic:
        patterns:
          - "@ionic/*"
      vueuse:
        patterns:
          - "@vueuse/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "staging"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
